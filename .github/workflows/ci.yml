name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Cross-version matrix. The override system depends on Swift's KeyPath string
  # interpolation format (see Sources/Forge/Internal/KeyPathName.swift), which is
  # NOT a documented language guarantee. This matrix is the safeguard that comment
  # relies on: it must catch any version where KeyPath name extraction breaks.
  test-linux:
    name: Test (Swift ${{ matrix.swift }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        swift: ["5.10", "6.0", "6.1", "6.2"]
    steps:
      - uses: actions/checkout@v4
      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: ${{ matrix.swift }}
      - name: Swift version
        run: swift --version
      - name: Build
        run: swift build
      - name: Test
        run: swift test

  # Build + test on the primary Apple platform with the latest toolchain.
  test-macos:
    name: Test (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Swift version
        run: swift --version
      - name: Build
        run: swift build
      - name: Test
        run: swift test
