name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Cross-version matrix. The override system depends on Swift's KeyPath string
  # interpolation format (see Sources/Forge/Internal/KeyPathName.swift), which is
  # NOT a documented language guarantee. This matrix is the safeguard that comment
  # relies on: it must catch any version where KeyPath name extraction breaks.
  #
  # Runs on macOS, not Linux: Forge supports Apple platforms only (see the
  # Requirements table in README.md), and the KeyPath name format the override
  # system reads is a *Darwin* behavior. Linux toolchains interpolate a computed
  # KeyPath as "<computed 0x… (Type)>" with no property name, so the override
  # tests cannot pass there — and no supported Forge user ships to Linux. We use
  # swift-actions/setup-swift (which installs swift.org Darwin toolchains) so the
  # matrix can cover every supported Swift version regardless of which Xcode the
  # runner image bundles.
  #
  # Each Swift version is pinned to a runner image whose macOS SDK that compiler
  # can build against: an older swift.org toolchain cannot parse a much newer
  # SDK's module map, so Swift 5.10 runs on macos-14 (MacOSX14 SDK) while the
  # 6.x toolchains run on macos-15. Bump these pairs as runner images change.
  test-apple:
    name: Test (Swift ${{ matrix.swift }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { swift: "5.10", os: macos-14 }
          - { swift: "6.0", os: macos-15 }
          - { swift: "6.1", os: macos-15 }
          - { swift: "6.2", os: macos-15 }
    steps:
      - uses: actions/checkout@v4
      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: ${{ matrix.swift }}
      - name: Swift version
        run: swift --version
      - name: Build
        run: swift build
      - name: Test
        run: swift test

  # Build + test with the runner's default Xcode toolchain — the compiler most
  # developers actually use, as opposed to the swift.org toolchains the matrix
  # above installs.
  test-macos:
    name: Test (macOS, default Xcode)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Swift version
        run: swift --version
      - name: Build
        run: swift build
      - name: Test
        run: swift test

  # The matrix above builds in Swift 5 language mode (the package's tools-version),
  # so it does not exercise strict-concurrency checking. This job compiles the target
  # under the Swift 6 language mode with complete strict concurrency — the gate that
  # keeps Forge's `@unchecked Sendable` and global-state claims honest.
  strict-concurrency:
    name: Strict concurrency (Swift 6 mode)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Swift version
        run: swift --version
      - name: Build under complete strict concurrency
        run: swift build -Xswiftc -strict-concurrency=complete -Xswiftc -swift-version -Xswiftc 6
